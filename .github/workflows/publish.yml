name: Publish (manual re-publish)

# ─────────────────────────────────────────────────────────────────────────────
# Fallback workflow for manually re-publishing an existing release to PyPI.
# Normal releases are fully automated via release.yml (workflow_dispatch).
# Use this only if a PyPI publish failed mid-flight and needs to be retried
# from an already-tagged release.
# ─────────────────────────────────────────────────────────────────────────────

on:
  release:
    types: [published]
  workflow_dispatch:

# Restrict default token permissions; each job grants only what it needs.
permissions: {}

# Opt in to Node.js 24 for all actions ahead of the June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4.4.3
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 1

  publish:
    # Only publish on an actual GitHub Release event — not on workflow_dispatch.
    # workflow_dispatch is intentionally limited to build + check so you can
    # validate artifacts without deploying.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI trusted publishing via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/pytmodules

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4.1.8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1