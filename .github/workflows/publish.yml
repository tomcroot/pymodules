name: Publish

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically when the Release workflow completes successfully.
# Also supports manual workflow_dispatch as a re-publish fallback.
#
# Note: we use workflow_run (not push: tags) because GITHUB_TOKEN-pushed tags
# cannot trigger other workflow runs — a GitHub Actions security restriction.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

# Restrict default token permissions; each job grants only what it needs.
permissions: {}

# Opt in to Node.js 24 for all actions ahead of the June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve latest release tag (workflow_run)
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --exclude-pre-releases --json tagName -q '.[0].tagName')
          git fetch --tags
          git checkout "$TAG"

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4.4.3
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for PyPI trusted publishing via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/pytmodules

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve latest release tag (workflow_run)
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --exclude-pre-releases --json tagName -q '.[0].tagName')
          git fetch --tags
          git checkout "$TAG"

      - name: Download distributions
        uses: actions/download-artifact@v4.1.8
        with:
          name: python-package-distributions
          path: dist/

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()); print(m.group(1))")
          export VERSION
          TAG="v${VERSION}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            exit 0
          fi

          python3 - <<'EOF'
          import re, os

          version = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              content = f.read()

          match = re.search(
              rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n---\n|\n## \[|\Z)",
              content,
              re.DOTALL,
          )

          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open("release_notes.md", "w") as f:
              f.write(notes)
          EOF

          gh release create "$TAG" --title "$TAG" --notes-file release_notes.md

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1