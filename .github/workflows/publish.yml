name: Publish

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically when a v* tag is pushed (i.e. after release.yml
# creates the tag). Also supports manual workflow_dispatch as a re-publish
# fallback if a publish fails mid-flight.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Restrict default token permissions; each job grants only what it needs.
permissions: {}

# Opt in to Node.js 24 for all actions ahead of the June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4.4.3
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for PyPI trusted publishing via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/pytmodules

    steps:
      - name: Check out repository
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v4.2.2

      - name: Download distributions
        uses: actions/download-artifact@v4.1.8
        with:
          name: python-package-distributions
          path: dist/

      - name: Ensure GitHub Release exists (tag pushes)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            exit 0
          fi

          python3 - <<'EOF'
          import re

          version = "${VERSION}"
          with open("CHANGELOG.md") as f:
              content = f.read()

          match = re.search(
              rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n---\n|\n## \[|\Z)",
              content,
              re.DOTALL,
          )

          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open("release_notes.md", "w") as f:
              f.write(notes)
          EOF

          gh release create "$TAG" --title "$TAG" --notes-file release_notes.md

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1